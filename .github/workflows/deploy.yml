name: Deploy tstack-kit-web

on:
  push:
    branches:
      - main

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: tstack-kit-web-prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat > ~/.ssh/config << 'EOF'
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile=/dev/null
          EOF
          chmod 600 ~/.ssh/config

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Kamal
        run: gem install kamal

      - name: Write Kamal secrets
        run: |
          mkdir -p .kamal
          printf "%s\n" "${{ secrets.KAMAL_SECRETS }}" > .kamal/secrets
          chmod 600 .kamal/secrets

      - name: Debug secrets file
        run: |
          echo "File exists: $(test -f .kamal/secrets && echo yes || echo no)"
          echo "File size: $(wc -c < .kamal/secrets) bytes"
          echo "Line count: $(wc -l < .kamal/secrets) lines"
          echo "Contains KAMAL_REGISTRY_PASSWORD: $(grep -c KAMAL_REGISTRY_PASSWORD .kamal/secrets || echo 0)"

      - name: Deploy production
        run: kamal deploy -c config/deploy.yml
